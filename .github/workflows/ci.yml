name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Fail the build on known high/critical advisories in the locked deps.
      # Moderate/low are reported (|| true) but don't block.
      - name: Audit dependencies
        run: |
          npm audit --audit-level=high
          npm audit || true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
