name: release

# Build the self-contained per-platform bundles and attach them to the GitHub
# Release. The installers (privateer.pro/install.sh, install.ps1) download these,
# so a user needs neither Node nor npm.
#
# Cross-building: `npm ci --os/--cpu` fetches each target's os/cpu-gated optional
# deps, and koffi/pi-tui ship all platforms in one package — so every target builds
# correctly on one Ubuntu runner. We still smoke-test on the real OS (Linux inline,
# Windows in a dedicated job) before publishing.
#
# Trigger: push a tag like v0.5.2 (or run by hand for a build-only dry run).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish a release"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write # required for npm provenance (Sigstore OIDC) — see publish-npm

env:
  NODE_VERSION: "22.19.0"

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create (or reuse) the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --generate-notes --verify-tag

  build:
    needs: [create-release]
    if: always() # still runs on dry-run (create-release skipped)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [darwin-arm64, darwin-x64, linux-x64, win32-x64]
        # linux-arm64 / win32-arm64 pending. See docs/shipping.md.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip xz-utils

      - name: Build bundle (${{ matrix.target }})
        run: node scripts/build-bundle.mjs --target ${{ matrix.target }} --node "${NODE_VERSION}"

      - name: Smoke test (Linux only — the only target this runner can execute)
        if: matrix.target == 'linux-x64'
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          tar -xzf "dist-bundle/privateer-${{ matrix.target }}.tar.gz" -C "$work"
          app="$work/privateer-${{ matrix.target }}"
          home="$work/home"; mkdir -p "$home"
          out="$(env -i PATH=/usr/bin:/bin:/usr/sbin:/sbin HOME="$home" \
                 PRIVATEER_HOME="$home/.privateer" TERM=xterm \
                 bash "$app/bin/privateer-tui" --version 2>&1)"
          echo "boot output: $out"; test -n "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: privateer-${{ matrix.target }}
          path: dist-bundle/privateer-${{ matrix.target }}.*

  # Real Windows verification: download the win bundle artifact, unzip, boot it.
  smoke-windows:
    needs: [build]
    if: always()
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: privateer-win32-x64
          path: dl
      - name: Boot the Windows bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Expand-Archive -Path (Get-ChildItem dl\*.zip)[0].FullName -DestinationPath extract -Force
          $app = "extract\privateer-win32-x64"
          $env:PRIVATEER_HOME = "$PWD\pvhome"
          $out = & "$app\bin\privateer.cmd" --version 2>&1 | Out-String
          Write-Host "boot output: $out"
          if (-not $out.Trim()) { throw "empty output — bundle failed to boot" }

  publish:
    needs: [build, smoke-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Attach all bundles to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dl/*/privateer-*.* --clobber

  # Publish to npm WITH PROVENANCE. This is the load-bearing trust signal: npm
  # records a signed Sigstore attestation binding the published tarball to this
  # repo, this commit and this workflow run, and the package page then renders a
  # verified "Built and signed on GitHub Actions" badge linking back to the build.
  # Anyone (or any agent) evaluating `npx privateer-agent` can check that the code
  # on npm is the code in the public repo — without trusting a maintainer's laptop.
  #
  # Auth is npm TRUSTED PUBLISHING (OIDC) — there is deliberately NO npm token here,
  # and none should be added. npmjs.com is configured to trust exactly this repo +
  # this workflow file, and the short-lived OIDC credential is minted per run, so
  # there is no long-lived publish secret to leak or rotate.
  #
  # Requirements, all of which must hold or the publish fails / loses provenance:
  #   - id-token: write (granted at workflow level above)
  #   - repository/homepage in package.json resolving to this public repo
  #   - a Trusted Publisher configured on npmjs.com naming THIS workflow filename
  #     (rename this file and publishing breaks until npm is updated to match)
  #   - npm >= 11.5.1 — Node 22.19.0 ships 10.9.x, hence the explicit upgrade below
  publish-npm:
    needs: [build, smoke-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing landed in npm 11.5.1; the Node we pin predates it.
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      # Dev deps are needed to typecheck; the published tarball is `files`-scoped
      # regardless. --ignore-scripts proves the package installs without running any
      # (there is no postinstall by design — see bin/apply-patches.mjs).
      - run: npm ci --ignore-scripts
      - run: npm run typecheck

      # The tag must match the version we're about to publish, or a mistagged push
      # publishes something nobody reviewed under that tag's provenance.
      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          pkg="$(node -p 'require("./package.json").version')"
          tag="${GITHUB_REF_NAME#v}"
          test "$pkg" = "$tag" || { echo "tag v$tag != package.json $pkg"; exit 1; }

      # No NODE_AUTH_TOKEN: the OIDC exchange supplies credentials. Provenance is
      # implied by trusted publishing; --provenance is kept explicit so a misconfigured
      # run fails loudly rather than quietly publishing an unattested tarball.
      - name: Publish
        run: npm publish --provenance --access public
